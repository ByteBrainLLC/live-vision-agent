<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Live Vision Agent</title>
<style>
:root{
  --bg:#0a0e14; --panel:#0f151e; --line:#1c2633; --text:#d7e0ea; --dim:#5d6f82;
  --cyan:#2ee6d6; --cyan-dim:#17554f; --amber:#f5b452; --red:#ff5d5d;
  --mono:"Cascadia Mono",Consolas,monospace; --sans:"Segoe UI",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;flex-direction:column;overflow:hidden}

header{display:flex;align-items:center;gap:16px;padding:10px 18px;border-bottom:1px solid var(--line);flex:none}
header h1{font:600 13px var(--mono);letter-spacing:3px;color:var(--cyan);text-transform:uppercase}
#clock{font:12px var(--mono);color:var(--dim);margin-left:auto}
#timer{font:12px var(--mono);color:var(--dim)}

.pill{display:inline-flex;align-items:center;gap:7px;font:11px var(--mono);letter-spacing:1px;
  text-transform:uppercase;padding:4px 12px;border-radius:999px;border:1px solid var(--line)}
.pill .dot{width:8px;height:8px;border-radius:50%;background:var(--dim)}
.pill[data-state=connecting] .dot,.pill[data-state=reconnecting] .dot{background:var(--amber);animation:pulse 1s infinite}
.pill[data-state=connecting],.pill[data-state=reconnecting]{color:var(--amber);border-color:#4a3a1e}
.pill[data-state=listening] .dot{background:var(--cyan)}
.pill[data-state=listening]{color:var(--cyan);border-color:var(--cyan-dim)}
.pill[data-state=speaking] .dot{background:var(--cyan);animation:pulse .6s infinite}
.pill[data-state=speaking]{color:var(--cyan);border-color:var(--cyan);box-shadow:0 0 12px rgba(46,230,214,.25)}
.pill[data-state=disconnected] .dot{background:var(--red)}
.pill[data-state=disconnected]{color:var(--red);border-color:#5a2727}
@keyframes pulse{50%{opacity:.25}}

#goaway{display:none;font:11px var(--mono);color:var(--amber);border:1px solid #4a3a1e;
  border-radius:999px;padding:4px 12px}
#goaway.on{display:inline-block;animation:pulse 1s infinite}

main{display:grid;grid-template-columns:minmax(420px,1.1fr) 1fr;gap:14px;padding:14px;flex:1;min-height:0}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.panel .head{font:10px var(--mono);letter-spacing:2px;color:var(--dim);text-transform:uppercase;
  padding:8px 12px;border-bottom:1px solid var(--line);flex:none}

#camwrap{position:relative;flex:1;display:flex;align-items:center;justify-content:center;background:#05080c;min-height:0}
#cam{max-width:100%;max-height:100%;object-fit:contain}
.overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  font:600 15px var(--mono);letter-spacing:4px;color:var(--amber);background:rgba(5,8,12,.72);text-transform:uppercase}
.overlay.red{color:var(--red)}
#camwrap.paused #pausedov{display:flex}
#camwrap.nosignal #nosigov{display:flex}

#transcript{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.bubble{max-width:86%;padding:9px 13px;border-radius:10px;font-size:14px;line-height:1.45;white-space:pre-wrap}
.bubble.agent{align-self:flex-start;background:#0d2622;border:1px solid var(--cyan-dim);color:#c9f5f0;border-bottom-left-radius:3px}
.bubble.user{align-self:flex-end;background:#1a2230;border:1px solid #2a3850;border-bottom-right-radius:3px}
.bubble .who{display:block;font:9px var(--mono);letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:4px}
.bubble.cut{border-style:dashed;opacity:.75}
.bubble.cut .who::after{content:" · interrupted";color:var(--amber)}
#emptymsg{color:var(--dim);font-size:13px;text-align:center;margin-top:30px}

footer{flex:none;display:flex;align-items:center;gap:14px;padding:10px 18px;border-top:1px solid var(--line)}
#wave{height:36px;flex:1;min-width:120px}
button{font:600 11px var(--mono);letter-spacing:2px;text-transform:uppercase;color:var(--text);
  background:#141c27;border:1px solid var(--line);border-radius:8px;padding:9px 16px;cursor:pointer}
button:hover{border-color:var(--cyan-dim)}
button .key{color:var(--dim);margin-right:6px}
button.active{color:var(--amber);border-color:#4a3a1e;background:#1d1812}
#legend{font:10px var(--mono);color:var(--dim);letter-spacing:1px}
</style>
</head>
<body>
<header>
  <h1>Live Vision Agent</h1>
  <span class="pill" id="status" data-state="connecting"><span class="dot"></span><span id="statustext">connecting</span></span>
  <span id="goaway"></span>
  <span id="timer">00:00</span>
  <span id="clock"></span>
</header>

<main>
  <section class="panel">
    <div class="head">camera &mdash; what the agent sees</div>
    <div id="camwrap" class="nosignal">
      <img id="cam" alt="">
      <div class="overlay" id="pausedov">camera paused</div>
      <div class="overlay red" id="nosigov">no signal</div>
    </div>
  </section>
  <section class="panel">
    <div class="head">transcript</div>
    <div id="transcript"><div id="emptymsg">Speak to begin &mdash; both sides of the conversation appear here.</div></div>
  </section>
</main>

<footer>
  <canvas id="wave"></canvas>
  <button id="micbtn"><span class="key">[M]</span><span id="miclabel">mute mic</span></button>
  <button id="cambtn"><span class="key">[C]</span><span id="camlabel">pause cam</span></button>
  <button id="restartbtn"><span class="key">[R]</span>restart</button>
  <span id="legend">localhost only &middot; streams to Google Live API &middot; nothing saved to disk</span>
</footer>

<script>
"use strict";
const $ = id => document.getElementById(id);
let micMuted = false, camPaused = false;
let lastFrameAt = 0;
let sessionStart = null;
let bubbles = {user: null, agent: null};

// ---- clock + session timer ----
setInterval(() => {
  $("clock").textContent = new Date().toLocaleTimeString();
  if (sessionStart !== null) {
    const s = Math.floor((Date.now() - sessionStart) / 1000);
    $("timer").textContent = String(Math.floor(s/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0");
  }
  // stale-frame detection
  if (!camPaused) {
    $("camwrap").classList.toggle("nosignal", Date.now() - lastFrameAt > 4000);
  }
}, 500);

// ---- status ----
function setStatus(state) {
  const pill = $("status");
  const prev = pill.dataset.state;
  pill.dataset.state = state;
  $("statustext").textContent = state;
  if (state === "listening" && (prev === "connecting" || prev === "reconnecting")) {
    sessionStart = Date.now();        // fresh session, fresh clock
    $("goaway").classList.remove("on");
  }
  if (state === "disconnected" || state === "reconnecting") sealBubble("agent");
}

// ---- transcript ----
function sealBubble(role) {
  if (bubbles[role]) bubbles[role] = null;
}
function appendTranscript(role, text) {
  const empty = $("emptymsg");
  if (empty) empty.remove();
  sealBubble(role === "user" ? "agent" : "user");  // role switch closes the other bubble
  if (!bubbles[role]) {
    const b = document.createElement("div");
    b.className = "bubble " + role;
    const who = document.createElement("span");
    who.className = "who";
    who.textContent = role === "user" ? "you" : "agent";
    b.appendChild(who);
    b.appendChild(document.createTextNode(""));
    $("transcript").appendChild(b);
    bubbles[role] = b;
  }
  bubbles[role].lastChild.textContent += text;
  $("transcript").scrollTop = $("transcript").scrollHeight;
}

// ---- waveform ----
const wave = $("wave"), wctx = wave.getContext("2d");
const levels = new Array(160).fill(0);
function pushLevel(v) { levels.push(v); levels.shift(); }
function drawWave() {
  const w = wave.clientWidth, h = wave.clientHeight;
  if (wave.width !== w) wave.width = w;
  if (wave.height !== h) wave.height = h;
  wctx.clearRect(0, 0, w, h);
  const n = levels.length, bw = w / n;
  wctx.fillStyle = micMuted ? "#3a2a1a" : "#2ee6d6";
  for (let i = 0; i < n; i++) {
    const amp = Math.max(1, Math.min(1, levels[i] * 6) * h * 0.9);
    wctx.fillRect(i * bw, (h - amp) / 2, Math.max(1, bw - 1), amp);
  }
  requestAnimationFrame(drawWave);
}
requestAnimationFrame(drawWave);

// ---- controls ----
function applyControls(mic, cam) {
  micMuted = mic; camPaused = cam;
  $("miclabel").textContent = mic ? "unmute mic" : "mute mic";
  $("micbtn").classList.toggle("active", mic);
  $("camlabel").textContent = cam ? "resume cam" : "pause cam";
  $("cambtn").classList.toggle("active", cam);
  $("camwrap").classList.toggle("paused", cam);
  if (cam) $("camwrap").classList.remove("nosignal");
}
$("micbtn").onclick = () => send({cmd: "mic", muted: !micMuted});
$("cambtn").onclick = () => send({cmd: "camera", paused: !camPaused});
$("restartbtn").onclick = () => send({cmd: "restart"});
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.metaKey || e.ctrlKey) return;
  if (e.key === "m" || e.key === "M") $("micbtn").click();
  if (e.key === "c" || e.key === "C") $("cambtn").click();
  if (e.key === "r" || e.key === "R") $("restartbtn").click();
});

// ---- websocket ----
let ws = null;
function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }
function connect() {
  ws = new WebSocket("ws://" + location.host + "/ws");
  ws.onmessage = e => {
    const ev = JSON.parse(e.data);
    switch (ev.type) {
      case "status":     setStatus(ev.state); break;
      case "transcript": appendTranscript(ev.role, ev.text); break;
      case "frame":
        $("cam").src = "data:image/jpeg;base64," + ev.jpeg_b64;
        lastFrameAt = Date.now();
        $("camwrap").classList.remove("nosignal");
        break;
      case "miclevel":   pushLevel(ev.rms); break;
      case "controls":   applyControls(ev.mic_muted, ev.camera_paused); break;
      case "goaway":
        $("goaway").textContent = "session ending: " + ev.time_left;
        $("goaway").classList.add("on");
        break;
      case "turn":
        if (ev.event === "interrupted" && bubbles.agent) bubbles.agent.classList.add("cut");
        sealBubble("agent");
        break;
    }
  };
  ws.onclose = () => { setStatus("disconnected"); setTimeout(connect, 1500); };
}
connect();
</script>
</body>
</html>
